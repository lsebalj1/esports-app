services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb"
    volumes:
      - dynamodb-data:/home/dynamodblocal
    networks:
      - esports-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - esports-net

  dynamodb-init:
    image: amazon/aws-cli:latest
    restart: on-failure
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: eu-central-1
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh", "/scripts/init-tables.sh"]
    networks:
      - esports-net

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=eu-central-1
    depends_on:
      - dynamodb-local
      - redis
      - dynamodb-init
    networks:
      - esports-net

  tournament-service:
    build: ./tournament-service
    ports:
      - "8002:8002"
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:8001
      - MATCH_SERVICE_URL=http://match-service:8003
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=eu-central-1
    depends_on:
      - dynamodb-local
      - redis
      - auth-service
    networks:
      - esports-net

  match-service:
    build: ./match-service
    ports:
      - "8003:8003"
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:8001
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=eu-central-1
    depends_on:
      - dynamodb-local
      - redis
      - auth-service
      - dynamodb-init
    networks:
      - esports-net
  
  stats-service:
    build: ./stats-service
    ports:
      - "8004:8004"
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:8001
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=eu-central-1
    depends_on:
      - dynamodb-local
      - redis
      - dynamodb-init
    networks:
      - esports-net
      
  seed:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./seed.py:/app/seed.py
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=eu-central-1
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    command: >
      sh -c "pip install boto3 aioboto3 passlib bcrypt -q &&
             python seed.py"
    depends_on:
      - dynamodb-init
    profiles:
      - seed
    networks:
      - esports-net

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - auth-service
      - tournament-service
      - match-service
      - stats-service
    networks:
      - esports-net
    restart: on-failure
    
networks:
  esports-net:
    driver: bridge

volumes:
  dynamodb-data: